<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turíscos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>

    <style>
         body{
        background-color: black;
        color: white;
    }
    </style>






    <div class="container">
        <h2>Pontos Turísticos Famosos</h2>
    </div>

    <br><br>

    <div class="container">
        <div class="row text-center g-4">
            
            <div class="col-md-4">
                <div class="card h-100">
                <h3>Taj Mahal</h3>

                <img src="https://images.unsplash.com/photo-1564507592333-c60657eea523?fm=jpg&q=60&w=3000&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8dGFqJTIwbWFoYWwlMjAlN0N8ZW58MHx8MHx8fDA%3D" 
                class="card-img-top" class="img-fluid" width="350" height="250">
                
                <button class="btn btn-warning" onclick="alert('é um icônico mausoléu situado em Agra, na Índia,O monumento é mundialmente conhecido como o maior símbolo de amor')">Saiba Mais</button>
                 </div>
            </div>

            

              <div class="col-md-4">
                <div class="card h-100">
                <h3>Coliseu</h3>
                
                <img src="https://super.abril.com.br/wp-content/uploads/2023/08/0814_coliseu_layout_site.jpg?crop=1&resize=1212,909" class="card-img-top" class="img-fluid" width="350" height="250">
                
                <button class="btn btn-info" onclick="alert('É o maior anfiteatro do Império Romano, localizado em Roma, Itália.')">Saiba Mais</button>
                </div>
            </div>

            

               <div class="col-md-4">
                <div class="card h-100">
                <h3>Cristo Redentor</h3>

                <img src="https://static.wixstatic.com/media/45b73f_e1a24919a7ab4779b7e578e29bdee559~mv2.jpg/v1/fill/w_568,h_354,al_c,q_80,usm_0.66_1.00_0.01,enc_avif,quality_auto/45b73f_e1a24919a7ab4779b7e578e29bdee559~mv2.jpg" 
                class="card-img-top" class="img-fluid" width="350" height="250">

                <button class="btn btn-success" onclick="alert('Localizado no Rio de Janeiro, Brasil, é umas 7 das maravilhas do mundo.')">Saiba Mais</button>
                </div>
            </div>

            


              <div class="col-md-4">
                <div class="card h-100">
                <h3>Machu Picchu</h3>

                <img src="https://www.adventureclub.com.br/wp-content/uploads/2017/07/machu-picchu-curiosidades-e-historia-peru-galeria.jpg" class="card-img-top" class="img-fluid" width="350" height="250">

                <button class="btn btn-primary" onclick="alert('Machu Picchu é uma cidadela inca que fica no alto da Cordilheira dos Andes no Peru, acima do vale do rio Urubamba.')">Saiba Mais</button>
                </div>
            </div>


            

             <div class="col-md-4">
                <div class="card h-100">
                <h3>Pirâmides do Egito</h3>

                <img src="https://static.nationalgeographicbrasil.com/files/styles/image_3200/public/nationalgeographic2743970_0.jpg?w=1900&h=1958" class="card-img-top" class="img-fluid" width="350" height="250">

                <button class="btn btn-dark" onclick="alert('As Pirâmides do Egito são estruturas monumentais construídas há cerca de 4.500 anos (entre 2600 e 2500 a.C.)..')">Saiba Mais</button>
                </div>
            </div>

            


            <div class="col-md-4">
                <div class="card h-100">
                <h3>Torre Eiffel</h3>

                <img src="https://assets.cityexperiences.com/wp-content/uploads/2023/01/denys-nevozhai-UzagqG756OU-unsplash.jpg" class="card-img-top" class="img-fluid" width="350" height="250">

                <button class="btn btn-danger" onclick="alert('Localizado na França, símbolo do amor.')">Saiba Mais</button>
                </div>
            </div>



        </div>
    </div>
